name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime env
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const clean = (value) => (value || '').trim().replace(/^["']|["']$/g, '');
          const env = {
            OPENROUTER_KEY: clean(process.env.OPENROUTER_KEY),
            SUPABASE_URL: clean(process.env.SUPABASE_URL),
            SUPABASE_ANON_KEY: clean(process.env.SUPABASE_ANON_KEY)
          };
          for (const [key, value] of Object.entries(env)) {
            if (!value) {
              console.error(`${key} secret is empty`);
              process.exit(1);
            }
          }
          fs.writeFileSync('env.js', `window.PROMPT_LAB_ENV = ${JSON.stringify(env, null, 2)};\n`);
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
